<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JW Player - Hotstar Stream</title>
    <script src="https://ssl.p.jwpcdn.com/player/v/8.26.2/jwplayer.js"></script>
    <style>
        body { margin: 0; background: #000; }
        #player-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

<div id="player-container"></div>

<script>
    const streamConfig = {
        file: "https://live11p.akt.hotstar-cdn.net/cmaf/live/2108387/inallow-ipl-2026/eng/1540065682/15mindvrm012ef2013414cb4b8782ca2fdb76b7ccd028march2026/master_a_stereo.m3u8",
        image: "https://img10.hotstar.com/image/upload/f_auto,q_90,w_256/sources/r1/cms/prod/8704/1764056908704-a",
        cookie: "hdntl=exp=1774733408~acl=%2f*~id=2cda5fef548d9a445c3c6908253c265b~data=hdntl~hmac=84bfbbaff8eb79a7337337c67eafdaec04e1cfb3fe6d726c59ab5ed111697fcc"
    };

    const playerInstance = jwplayer("player-container").setup({
        playlist: [{
            file: streamConfig.file,
            image: streamConfig.image,
            tracks: []
        }],
        width: "100%",
        height: "100%",
        autostart: true,
        mute: true,
        // Quality selection automatically handle ho jati hai m3u8 se
        displaytitle: true,
        preload: "auto",
        hlsjsConfig: {
            xhrSetup: function(xhr, url) {
                // Cookies aur Headers yahan set hote hain
                xhr.withCredentials = true;
                xhr.setRequestHeader("Cookie", streamConfig.cookie);
                // Note: Browser Referer header manually set karne se block kar sakta hai
            }
        }
    });

    // Quality Selection Control
    playerInstance.on('ready', function() {
        const levels = playerInstance.getQualityLevels();
        console.log("Available Qualities:", levels);
    });

    // Error Handling
    playerInstance.on('error', function(e) {
        console.error("JW Player Error:", e.message);
    });
</script>

</body>
</html>
